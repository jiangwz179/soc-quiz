<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教社實驗室 - 專業互動題庫 App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B7E66">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-cream: #FDFCF0; --primary-stone: #8B7E66; --text-main: #44403C; }
        body { background-color: var(--bg-cream); color: var(--text-main); -webkit-text-size-adjust: 100%; user-select: none; overscroll-behavior-y: contain; }
        .quiz-option-btn { transition: all 0.2s ease; touch-action: manipulation; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-stone-200">

    <div id="user-portal" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#FDFCF0]">
        <div class="w-[90%] max-w-md p-10 bg-white rounded-[2.5rem] shadow-2xl text-center">
            <h1 class="text-2xl font-serif italic mb-6">靈魂的教社實驗室</h1>
            <input type="text" id="usernameInput" placeholder="輸入姓名..." class="w-full px-6 py-4 rounded-2xl border mb-4 text-center">
            <button onclick="handleLogin()" class="w-full bg-stone-700 text-white font-bold py-4 rounded-2xl">進入系統</button>
        </div>
    </div>

    <nav id="main-nav" class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b hidden">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <span class="font-bold text-stone-800">🌿 教社題庫</span>
            <div class="flex items-center space-x-2">
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn px-3 py-2 rounded-lg text-sm bg-stone-100">📊 分析</button>
                <button onclick="switchView('explorer')" id="nav-explorer" class="nav-btn px-3 py-2 rounded-lg text-sm">🔍 探索</button>
                <button onclick="switchView('quiz')" id="nav-quiz" class="nav-btn px-3 py-2 rounded-lg text-sm">📝 測驗</button>
                <div class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center cursor-pointer" onclick="logout()" id="user-initial">U</div>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-5xl mx-auto px-4 py-8 hidden">
        <section id="view-dashboard" class="view-section block animate-fade-in">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center border">
                    <p class="text-xs text-stone-400">已精通</p>
                    <p class="text-4xl font-serif text-emerald-600" id="kpi-mastered">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center border">
                    <p class="text-xs text-stone-400">歷史正確率</p>
                    <p class="text-4xl font-serif text-stone-700" id="kpi-accuracy">0%</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center border">
                    <p class="text-xs text-stone-400">目前使用者</p>
                    <p class="text-xl font-bold text-stone-700" id="welcome-name">-</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl border h-[350px]">
                <canvas id="topicChart"></canvas>
            </div>
        </section>

        <section id="view-explorer" class="view-section hidden animate-fade-in">
            <div class="flex flex-col gap-3 mb-6">
                <input type="text" id="searchInput" placeholder="搜尋題目..." class="p-3 rounded-xl border">
                <select id="topicFilter" class="p-3 rounded-xl border bg-white font-bold">
                    <option value="all">📚 所有題目</option>
                    <option value="wrong">❌ 錯題專區</option>
                    <option value="mastered">✓ 已精通</option>
                </select>
            </div>
            <div id="question-list" class="space-y-4 max-h-[60vh] overflow-y-auto custom-scroll"></div>
        </section>

        <section id="view-quiz" class="view-section hidden animate-fade-in">
            <div id="quiz-setup" class="bg-white p-10 rounded-[2rem] text-center border">
                <h2 class="text-2xl font-bold mb-6">隨機 10 題挑戰</h2>
                <button onclick="startQuiz()" class="bg-stone-700 text-white px-10 py-4 rounded-xl font-bold">開始測驗</button>
            </div>
            <div id="quiz-active" class="hidden">
                <div class="flex justify-between mb-4"><span id="quiz-progress-text">1 / 10</span><div id="quiz-progress-dots" class="flex gap-1"></div></div>
                <div class="bg-white p-8 rounded-[2rem] border shadow-sm">
                    <h3 class="text-xl font-serif mb-8" id="quiz-q-text">載入中...</h3>
                    <div id="quiz-options" class="space-y-3"></div>
                    <div id="quiz-feedback" class="hidden mt-6 p-4 bg-stone-50 rounded-xl italic text-sm border">
                        <p id="feedback-content"></p>
                        <button onclick="nextQuizQuestion()" class="w-full mt-4 bg-stone-800 text-white py-3 rounded-lg">下一題</button>
                    </div>
                </div>
            </div>
            <div id="quiz-results" class="hidden text-center bg-white p-10 rounded-[2rem] border">
                <h2 class="text-2xl font-bold mb-4">回合完成！</h2>
                <p class="text-5xl font-serif mb-8" id="result-score">0%</p>
                <button onclick="resetQuiz()" class="bg-stone-700 text-white px-8 py-3 rounded-lg">再試一次</button>
            </div>
        </section>
    </main>

    <script>
        function cleanQuestionText(text) { return text.replace(/^\（.*?\）\s*/, '').replace(/^\(.*?\)\s*/, ''); }

        const baseQuestions = [
            { id: 1, q: "（衝突論）下列關於文化霸權(Cultural hegemony)的敘述,何者是錯誤的?", options: ["(A)此概念由K. Marx 提出", "(B)社會文化是影響個體行為的根本要素", "(C)統治階級將自身文化以霸權形式,有效支配被統治階級", "(D)統治階級無法只憑政治與經濟優勢力量有效支配被統治階級,需要文化支配力的配合"], ans: 0, detail: "文化霸權由葛蘭西 (Gramsci) 提出。", tags: ["衝突論"] },
            { id: 2, q: "（功能論）教育具有維繫社會生存的功能,透過教育可使社會成員具有共同觀念。此過程最能說明?", options: ["(A)社會化", "(B)社會階級", "(C)社會分工", "(D)社會流動"], ans: 0, detail: "社會化是學習並內化規範的歷程。", tags: ["功能論"] },
            { id: 3, q: "（衝突論）強調個人經長期薰陶的修養，如氣質、品味。此種文化資本形式為？", options: ["(A)身體化形式", "(B)階層化形式", "(C)客體化形式", "(D)制度化形式"], ans: 0, detail: "身體化文化資本與習性相關。", tags: ["衝突論"] },
            { id: 4, q: "（解釋學派）柏恩斯坦(Bernstein)理論中,語法複雜且意義明確的語言傾向何種符碼?", options: ["(A)限制型符碼", "(B)聚集型符碼", "(C)統整型符碼", "(D)精緻型符碼"], ans: 3, detail: "精緻型符碼通常見於中產階級。", tags: ["解釋學派"] },
            { id: 5, q: "（衝突論）課程實施碎片化,容易抹滅創造力,使學生感覺被工具化。此描述接近?", options: ["(A)涵化", "(B)異化", "(C)濡化", "(D)分化"], ans: 1, detail: "異化是馬克思主義核心概念。", tags: ["衝突論"] },
            { id: 6, q: "（解釋學派）陳老師認為學科界線嚴明，跨領域會縮減授課時間。這屬於 Bernstein 哪種分類？", options: ["(A)弱分類弱架構", "(B)強分類弱架構", "(C)弱分類強架構", "(D)強分類強架構"], ans: 3, detail: "強分類意指學科界線難以滲透。", tags: ["解釋學派"] },
            { id: 7, q: "（功能論）原生家庭為勞工階級，靠努力流動成為中產。此信念符合下列哪一理論？", options: ["(A)社會重建論", "(B)結構功能論", "(C)符號互動論", "(D)階級衝突論"], ans: 1, detail: "功能論強調功績主義。", tags: ["功能論"] },
            { id: 8, q: "（衝突論）小恩經常去美術館,擅長鋼琴與繪畫。這符合下列哪一種資本?", options: ["(A)經濟資本", "(B)象徵資本", "(C)文化資本", "(D)人力資本"], ans: 2, detail: "文化資本包含藝術素養、語言能力。", tags: ["衝突論"] },
            { id: 9, q: "（教育均等）《新住民就讀大學辦法》採外加名額。此作法屬於下列哪一種實踐?", options: ["(A)補救性教育措施", "(B)積極性差別待遇", "(C)文化再製", "(D)文化同化"], ans: 1, detail: "積極性差別待遇追求實質平等。", tags: ["教育均等"] },
            { id: 10, q: "（衝突論）提及勞工階級學生的「反學校文化」,該觀點最接近誰?", options: ["(A)傅柯", "(B)衛里斯", "(C)艾波", "(D)布迪爾"], ans: 1, detail: "衛里斯的《學做工》分析。", tags: ["衝突論"] },
            { id: 11, q: "（社會體系）東東媽媽面臨開會與接小孩的時間拉扯。這是指？", options: ["(A)角色衝突", "(B)角色期望", "(C)角色分化", "(D)角色扮演"], ans: 0, detail: "角色衝突指多重責任衝突。", tags: ["社會體系"] }
        ];

        const dbQuestions = [];
        for(let i=1; i<=220; i++) {
            const base = baseQuestions[(i-1) % baseQuestions.length];
            dbQuestions.push({ ...base, id: i });
        }

        const state = {
            currentUser: null, mastery: {}, 
            roundCounter: parseInt(localStorage.getItem('edu_round_total')) || 0,
            quiz: { currentSet: [], currentIndex: 0, results: [], hasAnswered: false }
        };

        function handleLogin() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) return;
            state.currentUser = name;
            state.mastery = JSON.parse(localStorage.getItem(`edu_m_v6_${name}`)) || {};
            document.getElementById('user-portal').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-initial').innerText = name.charAt(0).toUpperCase();
            document.getElementById('welcome-name').innerText = name;
            updateDashboard();
            initExplorer();
            localStorage.setItem('edu_last_user', name);
        }

        function logout() { localStorage.removeItem('edu_last_user'); location.reload(); }

        function saveData() {
            if(state.currentUser) {
                localStorage.setItem(`edu_m_v6_${state.currentUser}`, JSON.stringify(state.mastery));
                localStorage.setItem('edu_round_total', state.roundCounter.toString());
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-stone-100'));
            document.getElementById(`nav-${viewName}`).classList.add('bg-stone-100');
            if(viewName === 'dashboard') updateDashboard();
            if(viewName === 'explorer') renderExplorerList();
        }

        function updateDashboard() {
            const masteredCount = Object.values(state.mastery).filter(m => m.con >= 3).length;
            document.getElementById('kpi-mastered').innerText = masteredCount;
            let totalC = 0, totalT = 0;
            Object.values(state.mastery).forEach(m => { totalC += (m.totalC || 0); totalT += ((m.totalC || 0) + (m.totalW || 0)); });
            document.getElementById('kpi-accuracy').innerText = totalT > 0 ? Math.round((totalC/totalT)*100) + '%' : '0%';
        }

        function initExplorer() {
            document.getElementById('searchInput').oninput = renderExplorerList;
            document.getElementById('topicFilter').onchange = renderExplorerList;
        }

        function renderExplorerList() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filterType = document.getElementById('topicFilter').value;
            const container = document.getElementById('question-list');
            container.innerHTML = '';
            const filtered = dbQuestions.filter(q => {
                const m = state.mastery[q.id] || { con: 0, totalW: 0 };
                const matchSearch = q.q.toLowerCase().includes(search);
                if (filterType === 'wrong') return matchSearch && (m.totalW > 0 && m.con < 3);
                if (filterType === 'mastered') return matchSearch && m.con >= 3;
                return matchSearch;
            });
            filtered.forEach(q => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-white rounded-xl border mb-3';
                div.innerHTML = `<h3 class="font-bold text-stone-700">${cleanQuestionText(q.q)}</h3><p class="text-xs text-stone-400 mt-2">${q.detail}</p>`;
                container.appendChild(div);
            });
        }

        // --- 修復隨機邏輯與重複問題 ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            state.roundCounter++;
            // 1. 先洗牌整個題庫
            const fullPool = shuffle([...dbQuestions]);
            const selectedSet = [];
            const seenContent = new Set();

            // 2. 挑選 10 題內容不重複且未精熟的題目
            for (let q of fullPool) {
                const m = state.mastery[q.id] || { con: 0 };
                const content = cleanQuestionText(q.q);
                
                if (m.con < 3 && !seenContent.has(content)) {
                    selectedSet.push(q);
                    seenContent.add(content);
                }
                if (selectedSet.length === 10) break;
            }

            if (selectedSet.length < 5) {
                alert("剩餘未精熟題目太少，請重置進度或繼續練習！");
                return;
            }

            state.quiz.currentSet = selectedSet;
            state.quiz.currentIndex = 0;
            state.quiz.results = [];
            document.getElementById('quiz-setup').classList.add('hidden');
            document.getElementById('quiz-results').classList.add('hidden');
            document.getElementById('quiz-active').classList.remove('hidden');
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const q = state.quiz.currentSet[state.quiz.currentIndex];
            state.quiz.hasAnswered = false;
            document.getElementById('quiz-progress-text').innerText = `${state.quiz.currentIndex + 1} / ${state.quiz.currentSet.length}`;
            document.getElementById('quiz-q-text').innerText = cleanQuestionText(q.q);
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border bg-white quiz-option-btn text-sm";
                btn.innerText = opt;
                btn.onclick = () => submitAnswer(i);
                opts.appendChild(btn);
            });
            document.getElementById('quiz-feedback').classList.add('hidden');
        }

        function submitAnswer(idx) {
            if(state.quiz.hasAnswered) return;
            state.quiz.hasAnswered = true;
            const q = state.quiz.currentSet[state.quiz.currentIndex];
            const isCorrect = idx === q.ans;
            if(!state.mastery[q.id]) state.mastery[q.id] = { con: 0, totalC: 0, totalW: 0 };
            if(isCorrect) { state.mastery[q.id].con++; state.mastery[q.id].totalC++; }
            else { state.mastery[q.id].con = 0; state.mastery[q.id].totalW++; }
            saveData();
            document.querySelectorAll('.quiz-option-btn').forEach((btn, i) => {
                btn.disabled = true;
                if(i === q.ans) btn.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
                else if(i === idx) btn.classList.add('bg-rose-50', 'text-rose-500');
            });
            document.getElementById('feedback-content').innerText = isCorrect ? "✨ 正確！" : `💡 解析：${q.detail}`;
            document.getElementById('quiz-feedback').classList.remove('hidden');
            state.quiz.results.push(isCorrect);
        }

        function nextQuizQuestion() {
            state.quiz.currentIndex++;
            if(state.quiz.currentIndex < state.quiz.currentSet.length) renderQuizQuestion();
            else {
                document.getElementById('quiz-active').classList.add('hidden');
                document.getElementById('quiz-results').classList.remove('hidden');
                const score = state.quiz.results.filter(r => r).length;
                document.getElementById('result-score').innerText = Math.round((score / state.quiz.currentSet.length) * 100) + '%';
            }
        }

        function resetQuiz() { document.getElementById('quiz-results').classList.add('hidden'); document.getElementById('quiz-setup').classList.remove('hidden'); }

        window.onload = () => {
            const lastUser = localStorage.getItem('edu_last_user');
            if(lastUser) { document.getElementById('usernameInput').value = lastUser; handleLogin(); }
        };
    </script>
</body>
</html>
