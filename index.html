<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教社實驗室 - 專業互動題庫 App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B7E66">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="教社題庫">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-cream: #FDFCF0;
            --primary-stone: #8B7E66;
            --secondary-earth: #A9907E;
            --text-main: #44403C;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-text-size-adjust: 100%;
            user-select: none;
            overscroll-behavior-y: contain;
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.875rem !important; }
            .quiz-q-text { font-size: 1.25rem !important; }
        }

        input, select {
            font-size: 16px !important;
            appearance: none;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
        @media (min-width: 768px) {
            .chart-container { height: 400px; }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 10px; }

        .quiz-option-btn {
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</head>
<body class="font-sans antialiased overflow-x-hidden selection:bg-stone-200">

    <div id="user-portal" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#FDFCF0] transition-opacity duration-500">
        <div class="w-[90%] max-w-md p-6 sm:p-10 bg-white rounded-[2.5rem] shadow-2xl border border-stone-100 text-center">
            <div class="w-16 h-16 sm:w-20 sm:h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <span class="text-3xl sm:text-4xl">🖋️</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-serif italic text-stone-800 mb-2">靈魂的教社實驗室</h1>
            <p class="text-stone-400 text-[10px] sm:text-xs mb-8 tracking-widest uppercase font-bold">個人化學習系統</p>
            
            <div class="space-y-4">
                <input type="text" id="usernameInput" placeholder="請輸入學習者姓名..." class="w-full px-6 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-stone-400 outline-none text-center text-lg">
                <button onclick="handleLogin()" class="w-full bg-stone-700 hover:bg-stone-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                    開始深度思辨
                </button>
            </div>
            <p class="mt-6 text-[10px] text-stone-300 italic px-2">
                ※ 進度自動保存，連續答對 3 次即精通
            </p>
        </div>
    </div>

    <nav id="main-nav" class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-stone-200 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-xl sm:text-2xl">🌿</span>
                    <span class="font-bold text-lg sm:text-xl text-stone-800 tracking-tighter">教社題庫</span>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-2">
                    <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn px-2 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-stone-700 bg-stone-100">📊 分析</button>
                    <button onclick="switchView('explorer')" id="nav-explorer" class="nav-btn px-2 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-stone-500">🔍 探索</button>
                    <button onclick="switchView('quiz')" id="nav-quiz" class="nav-btn px-2 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-stone-500">📝 測驗</button>
                    <div class="h-6 w-px bg-stone-200 mx-1"></div>
                    <div class="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center border border-stone-200 cursor-pointer hover:bg-stone-200 transition-colors" onclick="logout()">
                        <span class="text-xs font-bold text-stone-500" id="user-initial">U</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-5xl mx-auto px-4 py-6 sm:py-8 hidden">
        
        <section id="view-dashboard" class="view-section block animate-fade-in">
            <div class="mb-8">
                <h1 class="text-3xl font-extrabold text-stone-800 font-serif italic">歡迎，<span id="welcome-name">學習者</span></h1>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                <div class="bg-white rounded-2xl shadow-sm border border-stone-100 p-6 text-center">
                    <p class="text-[10px] font-black uppercase text-stone-400 tracking-widest mb-1">已精通</p>
                    <p class="text-4xl font-serif text-emerald-600" id="kpi-mastered">0</p>
                    <div class="mt-3 h-1 bg-stone-50 rounded-full overflow-hidden">
                        <div id="mastery-bar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-stone-100 p-6 text-center">
                    <p class="text-[10px] font-black uppercase text-stone-400 tracking-widest mb-1">歷史正確率</p>
                    <p class="text-4xl font-serif text-stone-700" id="kpi-accuracy">0%</p>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-stone-100 p-6 text-center">
                    <p class="text-[10px] font-black uppercase text-stone-400 tracking-widest mb-1">已嘗試</p>
                    <p class="text-4xl font-serif text-stone-700" id="kpi-progress">0</p>
                </div>
            </div>
            <div class="bg-white rounded-[2rem] shadow-sm border border-stone-100 p-4 sm:p-8 mb-8">
                <h2 class="text-lg font-bold text-stone-700 mb-6 italic font-serif">📊 各學派掌握統計</h2>
                <div class="chart-container">
                    <canvas id="topicChart"></canvas>
                </div>
            </div>
        </section>

        <section id="view-explorer" class="view-section hidden animate-fade-in">
            <div class="mb-4">
                <h2 class="text-xl font-bold text-stone-800 font-serif italic">題庫檔案探索</h2>
            </div>
            <div class="flex flex-col gap-4 mb-6">
                <input type="text" id="searchInput" placeholder="搜尋題目關鍵字..." class="w-full px-5 py-3 rounded-xl border border-stone-200 focus:ring-2 focus:ring-stone-400 outline-none">
                <select id="topicFilter" class="w-full px-5 py-3 rounded-xl border border-stone-200 bg-white font-bold text-stone-600">
                    <option value="all">📚 所有題目</option>
                    <option value="wrong">❌ 錯題專區 (重點複習)</option>
                    <option value="mastered">✓ 已精通</option>
                    <option value="learning">⏳ 學習中</option>
                    <option value="new">🆕 未接觸</option>
                </select>
            </div>
            <div id="question-list" class="space-y-4 max-h-[60vh] overflow-y-auto custom-scroll"></div>
        </section>

        <section id="view-quiz" class="view-section hidden animate-fade-in">
            <div id="quiz-setup" class="bg-white rounded-[2.5rem] p-8 sm:p-12 text-center max-w-2xl mx-auto shadow-sm">
                <span class="text-5xl block mb-6">📜</span>
                <h2 class="text-2xl font-bold text-stone-800 mb-4">開啟隨機挑戰</h2>
                <button onclick="startQuiz()" class="w-full bg-stone-700 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-transform">
                    啟動測驗 (10題)
                </button>
            </div>
            <div id="quiz-active" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="text-stone-700 font-serif font-bold" id="quiz-progress-text">1 / 10</h4>
                    <div id="quiz-progress-dots" class="flex gap-1"></div>
                </div>
                <div class="bg-white rounded-[2rem] p-6 sm:p-10 shadow-sm border border-stone-100">
                    <h3 class="text-xl sm:text-2xl font-serif text-stone-800 leading-relaxed mb-8 quiz-q-text" id="quiz-q-text">載入中...</h3>
                    <div class="space-y-3 sm:space-y-4" id="quiz-options"></div>
                    <div id="quiz-feedback" class="hidden mt-8 animate-fade-in">
                        <div id="feedback-content" class="p-6 rounded-2xl bg-stone-50 text-sm mb-6 border border-stone-100 italic"></div>
                        <button onclick="nextQuizQuestion()" class="w-full bg-stone-800 text-white py-4 rounded-xl font-bold">下一題 →</button>
                    </div>
                </div>
            </div>
            <div id="quiz-results" class="hidden text-center bg-white rounded-[3rem] p-10 shadow-sm">
                <span class="text-5xl block mb-4">🌿</span>
                <h2 class="text-2xl font-serif italic mb-6">回合結算</h2>
                <p class="text-4xl font-serif text-stone-700 mb-8" id="result-score">0%</p>
                <div class="flex flex-col gap-3">
                    <button onclick="resetQuiz()" class="bg-stone-700 text-white py-4 rounded-xl font-bold">再試一回</button>
                    <button onclick="switchView('dashboard')" class="text-stone-400 py-2 text-sm">回儀表板</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        function cleanQuestionText(text) {
            return text.replace(/^\（.*?\）\s*/, '').replace(/^\(.*?\)\s*/, '');
        }

        const baseQuestions = [
            { id: 1, q: "（衝突論）下列關於文化霸權(Cultural hegemony)的敘述,何者是錯誤的?", options: ["(A)此概念由K. Marx 提出", "(B)社會文化是影響個體行為的根本要素", "(C)統治階級將自身文化以霸權形式,有效支配被統治階級", "(D)統治階級無法只憑政治與經濟優勢力量有效支配被統治階級,需要文化支配力的配合"], ans: 0, detail: "文化霸權由葛蘭西 (Gramsci) 提出。", tags: ["衝突論"] },
            { id: 2, q: "（功能論）教育具有維繫社會生存的功能,透過教育可使社會成員具有共同觀念。此過程最能說明?", options: ["(A)社會化", "(B)社會階級", "(C)社會分工", "(D)社會流動"], ans: 0, detail: "社會化是學習並內化規範的歷程。", tags: ["功能論"] },
            { id: 3, q: "（衝突論）強調個人經長期薰陶的修養，如氣質、品味。此種文化資本形式為？", options: ["(A)身體化形式", "(B)階層化形式", "(C)客體化形式", "(D)制度化形式"], ans: 0, detail: "身體化文化資本與習性相關。", tags: ["衝突論"] },
            { id: 4, q: "（解釋學派）柏恩斯坦(Bernstein)理論中,語法複雜且意義明確的語言傾向何種符碼?", options: ["(A)限制型符碼", "(B)聚集型符碼", "(C)統整型符碼", "(D)精緻型符碼"], ans: 3, detail: "精緻型符碼通常見於中產階級。", tags: ["解釋學派"] },
            { id: 5, q: "（衝突論）課程實施碎片化,容易抹滅創造力,使學生感覺被工具化。此描述接近?", options: ["(A)涵化", "(B)異化", "(C)濡化", "(D)分化"], ans: 1, detail: "異化是馬克思主義核心概念。", tags: ["衝突論"] },
            { id: 6, q: "（解釋學派）陳老師認為學科界線嚴明，跨領域會縮減授課時間。這屬於 Bernstein 哪種分類？", options: ["(A)弱分類弱架構", "(B)強分類弱架構", "(C)弱分類強架構", "(D)強分類強架構"], ans: 3, detail: "強分類意指學科界線難以滲透。", tags: ["解釋學派"] },
            { id: 7, q: "（功能論）原生家庭為勞工階級，靠努力流動成為中產。此信念符合下列哪一理論？", options: ["(A)社會重建論", "(B)結構功能論", "(C)符號互動論", "(D)階級衝突論"], ans: 1, detail: "功能論強調功績主義。", tags: ["功能論"] },
            { id: 8, q: "（衝突論）小恩經常去美術館,擅長鋼琴與繪畫。這符合下列哪一種資本?", options: ["(A)經濟資本", "(B)象徵資本", "(C)文化資本", "(D)人力資本"], ans: 2, detail: "文化資本包含藝術素養、語言能力。", tags: ["衝突論"] },
            { id: 9, q: "（教育均等）《新住民就讀大學辦法》採外加名額。此作法屬於下列哪一種實踐?", options: ["(A)補救性教育措施", "(B)積極性差別待遇", "(C)文化再製", "(D)文化同化"], ans: 1, detail: "積極性差別待遇追求實質平等。", tags: ["教育均等"] },
            { id: 10, q: "（衝突論）提及勞工階級學生的「反學校文化」,該觀點最接近誰?", options: ["(A)傅柯", "(B)衛里斯", "(C)艾波", "(D)布迪爾"], ans: 1, detail: "衛里斯的《學做工》分析。", tags: ["衝突論"] },
            { id: 11, q: "（社會體系）東東媽媽面臨開會與接小孩的時間拉扯。這是指？", options: ["(A)角色衝突", "(B)角色期望", "(C)角色分化", "(D)角色扮演"], ans: 0, detail: "角色衝突指多重責任衝突。", tags: ["社會體系"] }
        ];

        const dbQuestions = [];
        for(let i=1; i<=220; i++) {
            const base = baseQuestions[(i-1) % baseQuestions.length];
            dbQuestions.push({ ...base, id: i });
        }

        const state = {
            currentUser: null,
            mastery: {}, 
            roundCounter: parseInt(localStorage.getItem('edu_round_total')) || 0,
            quiz: { currentSet: [], currentIndex: 0, results: [], hasAnswered: false }
        };

        function handleLogin() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) return;
            login(name);
        }

        function login(name) {
            state.currentUser = name;
            const savedData = localStorage.getItem(`edu_m_v6_${name}`);
            state.mastery = savedData ? JSON.parse(savedData) : {};
            document.getElementById('user-portal').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-initial').innerText = name.charAt(0).toUpperCase();
            document.getElementById('welcome-name').innerText = name;
            updateDashboard();
            initExplorer();
            localStorage.setItem('edu_last_user', name);
        }

        function logout() {
            if(confirm("確定要登出並切換使用者嗎？")) {
                saveData(); 
                localStorage.removeItem('edu_last_user'); 
                location.reload(); 
            }
        }

        function saveData() {
            if(state.currentUser) {
                localStorage.setItem(`edu_m_v6_${state.currentUser}`, JSON.stringify(state.mastery));
                localStorage.setItem('edu_round_total', state.roundCounter.toString());
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-stone-700', 'bg-stone-100');
                btn.classList.add('text-stone-500');
            });
            document.getElementById(`nav-${viewName}`).classList.add('text-stone-700', 'bg-stone-100');
            if(viewName === 'dashboard') updateDashboard();
            if(viewName === 'explorer') renderExplorerList();
            window.scrollTo(0,0);
        }

        function updateDashboard() {
            const masteredCount = Object.values(state.mastery).filter(m => m.con >= 3).length;
            const totalQs = dbQuestions.length;
            document.getElementById('kpi-mastered').innerText = masteredCount;
            document.getElementById('kpi-progress').innerText = Object.keys(state.mastery).length;
            document.getElementById('mastery-bar').style.width = (masteredCount/totalQs*100) + '%';
            
            let totalC = 0, totalT = 0;
            Object.values(state.mastery).forEach(m => { totalC += (m.totalC || 0); totalT += ((m.totalC || 0) + (m.totalW || 0)); });
            document.getElementById('kpi-accuracy').innerText = totalT > 0 ? Math.round((totalC/totalT)*100) + '%' : '0%';
            
            const ctx = document.getElementById('topicChart').getContext('2d');
            const topicStats = {};
            dbQuestions.forEach(q => {
                const tag = q.tags[0];
                if(!topicStats[tag]) topicStats[tag] = { total: 0, mastered: 0 };
                topicStats[tag].total++;
                if(state.mastery[q.id] && state.mastery[q.id].con >= 3) topicStats[tag].mastered++;
            });
            const labels = Object.keys(topicStats).slice(0, 5);
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [
                    { label: '精通', data: labels.map(l => topicStats[l].mastered), backgroundColor: '#10B981', borderRadius: 4 },
                    { label: '學習', data: labels.map(l => topicStats[l].total - topicStats[l].mastered), backgroundColor: '#E7E5E4', borderRadius: 4 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
            });
        }

        function initExplorer() {
            document.getElementById('searchInput').oninput = renderExplorerList;
            document.getElementById('topicFilter').onchange = renderExplorerList;
        }

        function renderExplorerList() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filterType = document.getElementById('topicFilter').value;
            const container = document.getElementById('question-list');
            container.innerHTML = '';
            
            const filtered = dbQuestions.filter(q => {
                const m = state.mastery[q.id];
                const matchSearch = q.q.toLowerCase().includes(search);
                let matchType = true;
                
                // 核心邏輯：錯題區篩選 (曾經答錯過且尚未連續答對3次)
                if (filterType === 'wrong') {
                    matchType = m && (m.totalW > 0) && (m.con < 3);
                } else if (filterType === 'mastered') {
                    matchType = m && m.con >= 3;
                } else if (filterType === 'learning') {
                    matchType = m && m.con < 3;
                } else if (filterType === 'new') {
                    matchType = !m;
                }
                
                return matchSearch && matchType;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-stone-300 italic">目前沒有符合條件的題目...</div>`;
            }

            filtered.forEach(q => {
                const m = state.mastery[q.id];
                const div = document.createElement('div');
                div.className = 'p-5 bg-white rounded-xl border border-stone-100 shadow-sm animate-fade-in';
                
                let statusBadge = '';
                if (m && m.con >= 3) statusBadge = '<span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded text-[10px]">✓ 已精通</span>';
                else if (m && m.totalW > 0) statusBadge = '<span class="bg-rose-50 text-rose-500 px-2 py-0.5 rounded text-[10px]">❌ 曾答錯</span>';
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-[10px] text-stone-300 font-bold uppercase tracking-widest">#${q.id} ${q.tags[0]}</div>
                        ${statusBadge}
                    </div>
                    <h3 class="font-bold text-stone-700 mb-3 leading-relaxed">${cleanQuestionText(q.q)}</h3>
                    <div class="p-4 bg-stone-50 rounded-lg text-xs text-stone-500 leading-relaxed border-l-2 border-stone-200">
                        <span class="font-bold block mb-1 text-stone-700">解題關鍵：</span>
                        ${q.detail}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function startQuiz() {
            state.roundCounter++;
            const pool = dbQuestions.filter(q => !(state.mastery[q.id] && state.mastery[q.id].con >= 3))
                .sort(() => Math.random() - 0.5).slice(0, 10);
            state.quiz.currentSet = pool;
            state.quiz.currentIndex = 0;
            state.quiz.results = [];
            state.quiz.hasAnswered = false;
            document.getElementById('quiz-setup').classList.add('hidden');
            document.getElementById('quiz-results').classList.add('hidden');
            document.getElementById('quiz-active').classList.remove('hidden');
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const q = state.quiz.currentSet[state.quiz.currentIndex];
            state.quiz.hasAnswered = false;
            document.getElementById('quiz-progress-text').innerText = `${state.quiz.currentIndex + 1} / 10`;
            document.getElementById('quiz-q-text').innerText = cleanQuestionText(q.q);
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-stone-100 bg-white hover:bg-stone-50 quiz-option-btn text-sm";
                btn.innerText = opt;
                btn.onclick = () => submitAnswer(i);
                opts.appendChild(btn);
            });
            document.getElementById('quiz-feedback').classList.add('hidden');
            const dots = document.getElementById('quiz-progress-dots');
            dots.innerHTML = Array(10).fill(0).map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i <= state.quiz.currentIndex ? 'bg-stone-400' : 'bg-stone-100'}"></div>`).join('');
        }

        function submitAnswer(idx) {
            if(state.quiz.hasAnswered) return;
            state.quiz.hasAnswered = true;
            const q = state.quiz.currentSet[state.quiz.currentIndex];
            const isCorrect = idx === q.ans;
            if(!state.mastery[q.id]) state.mastery[q.id] = { con: 0, totalC: 0, totalW: 0 };
            if(isCorrect) { state.mastery[q.id].con++; state.mastery[q.id].totalC++; }
            else { state.mastery[q.id].con = 0; state.mastery[q.id].totalW++; }
            saveData();
            document.querySelectorAll('.quiz-option-btn').forEach((btn, i) => {
                btn.disabled = true;
                if(i === q.ans) btn.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700', 'font-bold');
                else if(i === idx) btn.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-400');
                else btn.classList.add('opacity-40');
            });
            const fb = document.getElementById('quiz-feedback');
            document.getElementById('feedback-content').innerText = isCorrect ? "✨ 回答正確！" : `💡 解析：${q.detail}`;
            fb.classList.remove('hidden');
            state.quiz.results.push(isCorrect);
        }

        function nextQuizQuestion() {
            state.quiz.currentIndex++;
            if(state.quiz.currentIndex < 10) renderQuizQuestion();
            else {
                document.getElementById('quiz-active').classList.add('hidden');
                document.getElementById('quiz-results').classList.remove('hidden');
                const score = state.quiz.results.filter(r => r).length;
                document.getElementById('result-score').innerText = (score * 10) + '%';
            }
        }

        function resetQuiz() { document.getElementById('quiz-results').classList.add('hidden'); document.getElementById('quiz-setup').classList.remove('hidden'); }

        window.onload = () => {
            const lastUser = localStorage.getItem('edu_last_user');
            if(lastUser) {
                login(lastUser);
            }
        };
    </script>
</body>
</html>
